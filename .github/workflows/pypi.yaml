name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0). Leave empty to use git tag."
        required: false
        type: string
  release:
    types: [published]

env:
  PYPI_PKG_NAME: stock-data-skill

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
        persist-credentials: false

    - name: Fetch all tags
      run: git fetch --tags --force

    - name: Determine version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
        elif [ "${{ github.event_name }}" = "release" ]; then
          VERSION="${GITHUB_REF_NAME#v}"
        else
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
        fi
        echo "value=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Update version in pyproject.toml
      run: |
        VERSION="${{ steps.version.outputs.value }}"
        sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
        cat pyproject.toml | grep "^version"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: python3 -m pip install --upgrade pip hatchling build

    - name: Build a binary wheel and a source tarball
      run: python3 -m build

    - name: Verify built version
      run: |
        ls -la dist/
        WHEEL=$(ls dist/*.whl)
        echo "Built wheel: $WHEEL"
        if [[ "$WHEEL" != *"${{ steps.version.outputs.value }}"* ]]; then
          echo "ERROR: Built version does not match expected version ${{ steps.version.outputs.value }}"
          exit 1
        fi

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.PYPI_PKG_NAME }}
    permissions:
      id-token: write
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  create-release:
    name: Create GitHub Release 🎉
    if: github.event_name == 'workflow_dispatch'
    needs:
    - publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create release tag
      run: |
        VERSION="${{ needs.build.outputs.version }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v$VERSION" -m "Release $VERSION" || true
        git push --tags || true
